server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/mywebapp_access.log;
    error_log /var/log/nginx/mywebapp_error.log;

    location = / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }

    location /tasks {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }

    location / {
        return 404;
    }
}